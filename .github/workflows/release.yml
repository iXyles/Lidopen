name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version to release. Must match VERSION.
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Build and publish release
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate version
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          version_file="$(tr -d '[:space:]' < VERSION)"

          if [[ "$INPUT_VERSION" != "$version_file" ]]; then
            echo "Workflow version '$INPUT_VERSION' does not match VERSION '$version_file'." >&2
            exit 1
          fi

          if [[ ! "$INPUT_VERSION" =~ ^[0-9]+[.][0-9]+[.][0-9]+$ ]]; then
            echo "Version must use MAJOR.MINOR.PATCH format." >&2
            exit 1
          fi

      - name: Run tests
        run: swift test

      - name: Build app DMG
        env:
          LIDOPEN_VERSION: ${{ inputs.version }}
          LIDOPEN_BUILD_NUMBER: ${{ github.run_number }}
        run: ./Scripts/build_app.sh --dmg

      - name: Verify release artifact
        env:
          VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          artifact="dist/Lidopen-$VERSION-macos-$(uname -m).dmg"
          plist="dist/Lidopen.app/Contents/Info.plist"

          test -f "$artifact"
          test -d "dist/Lidopen.app"
          /usr/libexec/PlistBuddy -c "Print :CFBundleShortVersionString" "$plist" | grep -Fx "$VERSION"

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          artifact="dist/Lidopen-$VERSION-macos-$(uname -m).dmg"

          gh release create "v$VERSION" "$artifact" \
            --title "Lidopen v$VERSION" \
            --notes "Download the DMG, open it, then drag Lidopen.app to Applications."
